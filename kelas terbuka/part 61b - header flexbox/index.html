<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Header Flexbox</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg bg-light navbar-light fixed-top py-3">

      <div class="container">
      <a href="#" class="navbar-brand">Mari Travel</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navmenu"
          >
          <span class="navbar-toggler-icon"></span>
        </button>

      <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="" class="nav-link">Services</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">About</a>
              </li>
              <li class="nav-item">
                <a href="" class="nav-link">Contact us</a>
              </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- header -->
    <section class="header bg-light text-dark text-center text-sm-start pt-5 mt-5">
      <div class="container">
        <div class="d-flex align-items-center">
          <div>
            <h1><span class="text-primary">Mari</span> Jalan-jalan, <span class="text-primary">Mari</span> Travel</h1>
            <p class="lead">Yuk kita jalan, melepas penat, mengisi hari bersama teman-teman. Jadi, Mari Travel.</p>

            <button
              class="btn btn-primary btn-lg"
            >
              Yuk Berangkat!
            </button>
          </div>

          <img
          class="img-fluid w-50 d-none d-sm-block"
          src="images/header.svg"
          alt="header">
          </div>
      </div>
    </section>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</body>
</html>
