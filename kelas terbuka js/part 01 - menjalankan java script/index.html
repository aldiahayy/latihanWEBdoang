<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menjalankan Java Script</title>
</head>
<body>

    <h1>Menjalankan Java Script</h1>
    <ol>
        <li>Di browser nya langsung</li>
        <li>Bisa langsung di tag HTML nya dengan tag script</li>
        <li>menggunakan inline java script</li>
        <li>menggunakan eksternal java script</li>
    </ol>

    <!-- menjalankan java script di html nya langsung dengan tag script-->
    <script>
        console.log("halo bang");
        console.log("ini adalah java script dengan menggunakan tag script");
    </script>


    <!-- menjalankan java script dengan inline java script -->
    <button onclick="console.log('saya diklik');">
        klik saya
    </button>

    <!-- menjalankan java script dengan cara memanggil java script eksternal nya -->
    <script src="script.js"></script>
</body>
</html>
