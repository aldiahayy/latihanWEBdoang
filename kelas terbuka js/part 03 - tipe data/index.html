    <h1>Tipe Data</h1>
    <ol>
        <li>String</li>
        di buat diantara dua kutip "" atau petik satu ''
        <li>Number atau Angka</li>
        bisa jadi angka bulat atau desimal
        <li>Boolean</li>
        nilai nya hanya true(1) atau false(0)

        belum ada isi nya

        number tapi tidak ada
